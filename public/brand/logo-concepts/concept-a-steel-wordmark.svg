<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="500" fill="#111111"/>

  <!-- Concept A: Steel Wordmark -->
  <g transform="translate(110 110)">
    <text x="0" y="190" font-family="Oswald, 'Arial Narrow', sans-serif" font-size="220" font-weight="700" letter-spacing="4" fill="#F5F5F5">CHIMERA</text>

    <!-- Angular steel cuts -->
    <polygon points="648,44 690,44 662,104 620,104" fill="#111111"/>
    <polygon points="886,44 928,44 900,104 858,104" fill="#111111"/>
    <polygon points="1030,44 1072,44 1044,104 1002,104" fill="#111111"/>

