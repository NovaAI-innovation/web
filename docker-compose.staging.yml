services:
  chimera-web-staging:
    build:
      context: .
      dockerfile: Dockerfile
    image: chimera-web:staging
    container_name: chimera-web-staging
    ports:
      - "3000:3000"
    env_file:
      - .env.staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
