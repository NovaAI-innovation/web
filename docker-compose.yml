services:
  postgres:
    image: postgres:16-alpine
    container_name: chimera-postgres
    environment:
      POSTGRES_DB: chimera_production
      POSTGRES_USER: chimera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chimera -d chimera_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chimera-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: chimera-web:local
    container_name: chimera-web
    expose:
      - "3000"
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - app-data:/app/.data

  nginx:
    image: nginx:alpine
    container_name: chimera-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      chimera-web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
