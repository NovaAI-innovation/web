name: Production Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Create production env file
        run: |
          cp .env.production.example .env.production
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env.production
          echo "RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}" >> .env.production
          echo "ONCALL_ALERT_WEBHOOK_URL=${{ secrets.ONCALL_ALERT_WEBHOOK_URL }}" >> .env.production
          echo "OTEL_HTTP_ENDPOINT=${{ secrets.OTEL_HTTP_ENDPOINT }}" >> .env.production

      - name: Validate production env
        run: |
          set -a
          source .env.production
          set +a
          npm run production:check

      - name: Build and start production container
        run: docker compose -f docker-compose.production.yml up -d --build

      - name: Wait for health endpoint
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Production health check failed" >&2
          docker compose -f docker-compose.production.yml logs
          exit 1

      - name: Stop container
        if: always()
        run: docker compose -f docker-compose.production.yml down
